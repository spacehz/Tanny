version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:6
    container_name: tanny-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 12345
      MONGO_INITDB_DATABASE: TANY
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - tanny-network
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tanny-backend
    restart: always
    env_file:
      - ./backend/.env.docker
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - tanny-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tanny-frontend
    restart: always
    env_file:
      - ./frontend/.env.docker
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tanny-network

# Volumes
volumes:
  mongodb_data:
    driver: local

# Networks
networks:
  tanny-network:
    driver: bridge
