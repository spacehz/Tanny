version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:6
    container_name: tanny-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 12345
      MONGO_INITDB_DATABASE: TANY
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - tanny-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tanny-backend
    restart: always
    env_file:
      - ./backend/.env.docker
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - tanny-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tanny-frontend
    restart: always
    env_file:
      - ./frontend/.env.docker
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - tanny-network

# Volumes
volumes:
  mongodb_data:
    driver: local

# Networks
networks:
  tanny-network:
    driver: bridge
